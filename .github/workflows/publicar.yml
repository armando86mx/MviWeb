# Publica el sitio solo, sin pasos manuales:
#   - cada 3 horas: reconstruye para refrescar prédicas de YouTube y episodios
#     de Spotify (se hornean en cada build) y lo sube DIRECTO a Hostinger por
#     FTP (su Git no auto-despliega; la rama `deploy` queda como respaldo
#     para el botón "Desplegar" de hPanel).
#   - en cada push a main: publica los cambios de código/contenido.
# Si YouTube/Spotify no responden, check-medios.mjs aborta y el sitio en línea
# se queda como estaba; el siguiente run lo reintenta.
name: Publicar sitio

on:
  schedule:
    - cron: '17 */3 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      saltar_guard:
        description: 'Emergencia: publicar aunque falten videos/episodios'
        type: boolean
        default: false

concurrency:
  group: publicar
  cancel-in-progress: false

env:
  # Los secrets FTP se crean el día D (DEPLOY.md); sin los tres, el paso FTP se salta.
  FTP_LISTO: ${{ secrets.FTP_HOST != '' && secrets.FTP_USER != '' && secrets.FTP_PASS != '' }}

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - name: Build y push a la rama deploy
        env:
          DEPLOY_PUSH_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          MIN_MEDIOS: ${{ inputs.saltar_guard && '0' || '4' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/deploy.sh || { echo "— reintento en 60 s (YouTube parpadea a veces)…"; sleep 60; bash scripts/deploy.sh; }
      # Sube solo lo que cambió (lleva su propio estado en el servidor).
      # Si FTPS diera error de conexión, cambiar protocol a ftp.
      - name: Subir dist/ a Hostinger por FTP
        if: env.FTP_LISTO == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          # No usar security: strict — el cert FTP de Hostinger es *.hstgr.io,
          # no coincide con el dominio (el default loose sí conecta).
          protocol: ftps
          timeout: 60000
          local-dir: dist/
          server-dir: ./
